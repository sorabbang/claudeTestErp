spring:
  application:
    name: erp

  # H2 (개발용) - 로컬 개발 시 사용
  datasource:
    url: jdbc:h2:mem:erpdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # MySQL (운영용) - 아래 주석 해제 후 사용
  # datasource:
  #   url: jdbc:mysql://localhost:3306/erpdb?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   username: root
  #   password: your_password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

server:
  port: ${PORT:8080}
