<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>전표 상세</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">
                <i class="bi bi-receipt"></i> 전표 상세
            </h4>
            <p class="text-muted mb-0 small" th:text="|전표번호: ${journal.voucherNo}|"></p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/journals}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> 목록
            </a>
            <a th:href="@{/journals/{id}/edit(id=${journal.id})}" class="btn btn-outline-primary btn-sm"
               th:if="${journal.status.name() == 'DRAFT'}">
                <i class="bi bi-pencil"></i> 수정
            </a>
        </div>
    </div>

    <!-- 전표 기본정보 -->
    <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>전표 기본정보</h6>
            <span class="badge fs-6"
                  th:classappend="${journal.status.name() == 'DRAFT' ? 'bg-secondary' :
                                   (journal.status.name() == 'APPROVED' ? 'bg-primary' :
                                   (journal.status.name() == 'POSTED' ? 'bg-success' : 'bg-danger'))}"
                  th:text="${journal.status.label}">상태</span>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label text-muted small">전표번호</label>
                    <p class="fw-medium mb-0" th:text="${journal.voucherNo}">-</p>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small">거래일자</label>
                    <p class="fw-medium mb-0" th:text="${journal.transactionDate}">-</p>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small">합계금액</label>
                    <p class="fw-medium mb-0" th:text="${#numbers.formatDecimal(journal.totalAmount, 1, 'COMMA', 0, 'POINT')} + '원'">0원</p>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-muted small">등록일시</label>
                    <p class="fw-medium mb-0" th:text="${journal.createdAt != null ? #temporals.format(journal.createdAt, 'yyyy-MM-dd HH:mm') : '-'}">-</p>
                </div>
                <div class="col-12" th:if="${journal.description != null and !journal.description.isEmpty()}">
                    <label class="form-label text-muted small">적요</label>
                    <p class="fw-medium mb-0" th:text="${journal.description}">-</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 분개 내역 -->
    <div class="card mb-3">
        <div class="card-header">
            <h6 class="mb-0"><i class="bi bi-list-columns-reverse me-2"></i>분개 내역</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center" style="width: 50px;">#</th>
                            <th>계정과목</th>
                            <th class="text-end" style="width: 18%;">차변</th>
                            <th class="text-end" style="width: 18%;">대변</th>
                            <th>적요</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry, stat : ${journal.entries}">
                            <td class="text-center" th:text="${stat.index + 1}">1</td>
                            <td>
                                <span class="badge bg-light text-dark border me-1" th:text="${entry.account.code}">1010</span>
                                <span th:text="${entry.account.name}">현금</span>
                            </td>
                            <td class="text-end">
                                <span th:if="${entry.debitAmount > 0}"
                                      th:text="${#numbers.formatDecimal(entry.debitAmount, 1, 'COMMA', 0, 'POINT')} + '원'"></span>
                            </td>
                            <td class="text-end">
                                <span th:if="${entry.creditAmount > 0}"
                                      th:text="${#numbers.formatDecimal(entry.creditAmount, 1, 'COMMA', 0, 'POINT')} + '원'"></span>
                            </td>
                            <td th:text="${entry.memo ?: ''}">-</td>
                        </tr>
                    </tbody>
                    <tfoot class="table-light fw-bold">
                        <tr>
                            <td colspan="2" class="text-end">합계</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(totalDebit, 1, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                            <td class="text-end"
                                th:text="${#numbers.formatDecimal(totalCredit, 1, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- 상태 변경 액션 -->
    <div class="card">
        <div class="card-header">
            <h6 class="mb-0"><i class="bi bi-gear me-2"></i>전표 처리</h6>
        </div>
        <div class="card-body d-flex gap-2 flex-wrap">
            <!-- 임시저장 -> 승인 -->
            <form th:if="${journal.status.name() == 'DRAFT'}"
                  th:action="@{/journals/{id}/approve(id=${journal.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-primary" onclick="return confirm('이 전표를 승인하시겠습니까?')">
                    <i class="bi bi-check2-circle me-1"></i> 승인
                </button>
            </form>

            <!-- 승인 -> 전기 -->
            <form th:if="${journal.status.name() == 'APPROVED'}"
                  th:action="@{/journals/{id}/post(id=${journal.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-success" onclick="return confirm('이 전표를 전기 처리하시겠습니까?')">
                    <i class="bi bi-check-all me-1"></i> 전기
                </button>
            </form>

            <!-- 취소 (전기완료 전까지) -->
            <form th:if="${journal.status.name() != 'CANCELLED' and journal.status.name() != 'POSTED'}"
                  th:action="@{/journals/{id}/cancel(id=${journal.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger" onclick="return confirm('이 전표를 취소하시겠습니까?')">
                    <i class="bi bi-x-circle me-1"></i> 취소
                </button>
            </form>

            <!-- 삭제 (임시저장만) -->
            <a th:if="${journal.status.name() == 'DRAFT'}"
               th:href="@{/journals/{id}/delete(id=${journal.id})}"
               class="btn btn-danger"
               onclick="return confirm('이 전표를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')">
                <i class="bi bi-trash me-1"></i> 삭제
            </a>

            <span th:if="${journal.status.name() == 'POSTED'}" class="text-success align-self-center">
                <i class="bi bi-check-circle-fill me-1"></i> 전기 완료된 전표입니다.
            </span>
            <span th:if="${journal.status.name() == 'CANCELLED'}" class="text-danger align-self-center">
                <i class="bi bi-x-circle-fill me-1"></i> 취소된 전표입니다.
            </span>
        </div>
    </div>
</div>
</body>
</html>
