<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>전표 관리</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1"><i class="bi bi-receipt"></i> 전표 관리</h4>
            <p class="text-muted mb-0 small">등록된 전표 목록입니다. 전표를 클릭하면 상세 내역을 확인할 수 있습니다.</p>
        </div>
        <a th:href="@{/journals/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> 전표 입력
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>전표번호</th>
                        <th>거래일자</th>
                        <th>적요</th>
                        <th class="text-end">금액</th>
                        <th class="text-center">분개</th>
                        <th class="text-center">상태</th>
                        <th class="text-center">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="journal : ${journals}">
                        <td>
                            <a th:href="@{/journals/{id}(id=${journal.id})}"
                               class="text-decoration-none fw-medium"
                               th:text="${journal.voucherNo}">JV-001</a>
                        </td>
                        <td th:text="${journal.transactionDate}">2024-01-01</td>
                        <td>
                            <span th:text="${journal.description != null ? journal.description : '-'}"
                                  class="text-truncate d-inline-block" style="max-width: 200px;">적요</span>
                        </td>
                        <td class="text-end fw-medium"
                            th:text="${#numbers.formatDecimal(journal.totalAmount, 1, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                        <td class="text-center">
                            <span class="badge bg-light text-dark border" th:text="${journal.entries.size()} + '건'">0건</span>
                        </td>
                        <td class="text-center">
                            <span class="badge"
                                  th:classappend="${journal.status.name() == 'DRAFT' ? 'bg-secondary' :
                                    journal.status.name() == 'APPROVED' ? 'bg-primary' :
                                    journal.status.name() == 'POSTED' ? 'bg-success' : 'bg-danger'}"
                                  th:text="${journal.status.label}"></span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/journals/{id}(id=${journal.id})}"
                                   class="btn btn-outline-secondary" title="상세">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/journals/{id}/edit(id=${journal.id})}"
                                   class="btn btn-outline-primary" title="수정"
                                   th:if="${journal.status.name() == 'DRAFT'}">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/journals/{id}/delete(id=${journal.id})}"
                                   class="btn btn-outline-danger" title="삭제"
                                   th:if="${journal.status.name() == 'DRAFT'}"
                                   onclick="return confirm('정말 삭제하시겠습니까?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(journals)}">
                        <td colspan="7" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            등록된 전표가 없습니다.
                            <br>
                            <a th:href="@{/journals/new}" class="btn btn-primary btn-sm mt-3">
                                <i class="bi bi-plus-circle me-1"></i> 첫 전표 입력하기
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
