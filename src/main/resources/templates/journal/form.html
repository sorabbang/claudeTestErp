<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>전표 입력</title>
</head>
<body>
<div layout:fragment="content">
    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1">
                <i class="bi bi-receipt"></i>
                <span th:text="${journalForm.id != null ? '전표 수정' : '전표 입력'}"></span>
            </h4>
            <p class="text-muted mb-0 small">분개 라인의 차변/대변 합계가 일치해야 저장할 수 있습니다.</p>
        </div>
        <a th:href="@{/journals}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 목록으로
        </a>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <form th:action="@{/journals/save}" th:object="${journalForm}" method="post" id="journalForm">
        <input type="hidden" th:field="*{id}">

        <!-- 전표 헤더 -->
        <div class="card mb-3">
            <div class="card-header">
                <h6 class="mb-0"><i class="bi bi-info-circle me-2"></i>전표 기본정보</h6>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label fw-medium">전표번호</label>
                        <input type="text" class="form-control bg-light" th:field="*{voucherNo}"
                               placeholder="자동생성" readonly>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium">거래일자 <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{transactionDate}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium">상태</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statuses}"
                                    th:value="${s}"
                                    th:text="${s.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-medium">적요</label>
                        <input type="text" class="form-control" th:field="*{description}"
                               placeholder="거래 내용을 입력하세요">
                    </div>
                </div>
            </div>
        </div>

        <!-- 분개 라인 -->
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0"><i class="bi bi-list-columns-reverse me-2"></i>분개 라인</h6>
                <button type="button" class="btn btn-primary btn-sm" id="addEntryBtn">
                    <i class="bi bi-plus-circle me-1"></i> 라인 추가
                </button>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered mb-0" id="entryTable">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 50px;" class="text-center">#</th>
                                <th style="width: 30%;">계정과목 <span class="text-danger">*</span></th>
                                <th style="width: 20%;" class="text-end">차변(원)</th>
                                <th style="width: 20%;" class="text-end">대변(원)</th>
                                <th>적요</th>
                                <th style="width: 50px;" class="text-center">삭제</th>
                            </tr>
                        </thead>
                        <tbody id="entryBody">
                            <!-- 기존 데이터가 있을 경우 렌더링 -->
                            <tr th:each="entry, stat : *{entries}" class="entry-row">
                                <td class="text-center align-middle row-num" th:text="${stat.index + 1}">1</td>
                                <td>
                                    <input type="hidden" th:name="|entries[${stat.index}].id|" th:value="${entry.id}">
                                    <select class="form-select form-select-sm" th:name="|entries[${stat.index}].accountId|" required>
                                        <option value="">-- 계정과목 선택 --</option>
                                        <option th:each="acc : ${accounts}"
                                                th:value="${acc.id}"
                                                th:text="|[${acc.code}] ${acc.name}|"
                                                th:selected="${acc.id == entry.accountId}"></option>
                                    </select>
                                </td>
                                <td>
                                    <input type="number" class="form-control form-control-sm text-end debit-input"
                                           th:name="|entries[${stat.index}].debitAmount|"
                                           th:value="${entry.debitAmount}" step="1" min="0" placeholder="0">
                                </td>
                                <td>
                                    <input type="number" class="form-control form-control-sm text-end credit-input"
                                           th:name="|entries[${stat.index}].creditAmount|"
                                           th:value="${entry.creditAmount}" step="1" min="0" placeholder="0">
                                </td>
                                <td>
                                    <input type="text" class="form-control form-control-sm"
                                           th:name="|entries[${stat.index}].memo|"
                                           th:value="${entry.memo}" placeholder="메모">
                                </td>
                                <td class="text-center align-middle">
                                    <button type="button" class="btn btn-outline-danger btn-sm remove-entry-btn">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light">
                            <tr class="fw-bold">
                                <td colspan="2" class="text-end">합계</td>
                                <td class="text-end" id="totalDebit">0</td>
                                <td class="text-end" id="totalCredit">0</td>
                                <td colspan="2">
                                    <span id="balanceStatus" class="badge bg-secondary">입력 대기</span>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <!-- 저장 버튼 -->
        <div class="card">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <span class="text-muted small">
                        <i class="bi bi-info-circle me-1"></i>
                        차변 합계와 대변 합계가 일치해야 저장됩니다.
                    </span>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/journals}" class="btn btn-secondary">
                        <i class="bi bi-x-circle me-1"></i> 취소
                    </a>
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <i class="bi bi-check-circle me-1"></i> 저장
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

<th:block layout:fragment="scripts">
<!-- accounts data for JS -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var accountList = /*[[${accounts}]]*/ [];
    /*]]>*/
</script>
<script>
(function() {
    var entryBody = document.getElementById('entryBody');
    var addBtn = document.getElementById('addEntryBtn');

    // 계정과목 option HTML 생성
    function buildAccountOptions(selectedId) {
        var html = '<option value="">-- 계정과목 선택 --</option>';
        accountList.forEach(function(acc) {
            var selected = (acc.id == selectedId) ? ' selected' : '';
            html += '<option value="' + acc.id + '"' + selected + '>[' + acc.code + '] ' + acc.name + '</option>';
        });
        return html;
    }

    // 새 라인 추가
    function addEntryRow() {
        var idx = entryBody.querySelectorAll('.entry-row').length;
        var tr = document.createElement('tr');
        tr.className = 'entry-row';
        tr.innerHTML =
            '<td class="text-center align-middle row-num">' + (idx + 1) + '</td>' +
            '<td>' +
            '  <select class="form-select form-select-sm" name="entries[' + idx + '].accountId" required>' +
                buildAccountOptions(null) +
            '  </select>' +
            '</td>' +
            '<td>' +
            '  <input type="number" class="form-control form-control-sm text-end debit-input" ' +
            '         name="entries[' + idx + '].debitAmount" step="1" min="0" placeholder="0">' +
            '</td>' +
            '<td>' +
            '  <input type="number" class="form-control form-control-sm text-end credit-input" ' +
            '         name="entries[' + idx + '].creditAmount" step="1" min="0" placeholder="0">' +
            '</td>' +
            '<td>' +
            '  <input type="text" class="form-control form-control-sm" ' +
            '         name="entries[' + idx + '].memo" placeholder="메모">' +
            '</td>' +
            '<td class="text-center align-middle">' +
            '  <button type="button" class="btn btn-outline-danger btn-sm remove-entry-btn">' +
            '    <i class="bi bi-trash"></i>' +
            '  </button>' +
            '</td>';
        entryBody.appendChild(tr);
        bindRowEvents(tr);
        reindexRows();
        updateTotals();
    }

    // 행 이벤트 바인딩
    function bindRowEvents(tr) {
        tr.querySelector('.remove-entry-btn').addEventListener('click', function() {
            if (entryBody.querySelectorAll('.entry-row').length <= 1) {
                alert('최소 1개의 분개 라인이 필요합니다.');
                return;
            }
            tr.remove();
            reindexRows();
            updateTotals();
        });

        var debitInput = tr.querySelector('.debit-input');
        var creditInput = tr.querySelector('.credit-input');

        debitInput.addEventListener('input', function() {
            if (this.value && parseFloat(this.value) > 0) {
                creditInput.value = '';
            }
            updateTotals();
        });
        creditInput.addEventListener('input', function() {
            if (this.value && parseFloat(this.value) > 0) {
                debitInput.value = '';
            }
            updateTotals();
        });
    }

    // 행 번호 및 name 인덱스 재정렬
    function reindexRows() {
        var rows = entryBody.querySelectorAll('.entry-row');
        rows.forEach(function(row, idx) {
            row.querySelector('.row-num').textContent = idx + 1;
            var idInput = row.querySelector('input[type="hidden"]');
            if (idInput) idInput.name = 'entries[' + idx + '].id';
            row.querySelector('select').name = 'entries[' + idx + '].accountId';
            row.querySelector('.debit-input').name = 'entries[' + idx + '].debitAmount';
            row.querySelector('.credit-input').name = 'entries[' + idx + '].creditAmount';
            var memoInput = row.querySelector('input[placeholder="메모"]');
            if (memoInput) memoInput.name = 'entries[' + idx + '].memo';
        });
    }

    // 합계 업데이트
    function updateTotals() {
        var totalDebit = 0, totalCredit = 0;
        document.querySelectorAll('.debit-input').forEach(function(input) {
            totalDebit += parseFloat(input.value) || 0;
        });
        document.querySelectorAll('.credit-input').forEach(function(input) {
            totalCredit += parseFloat(input.value) || 0;
        });

        document.getElementById('totalDebit').textContent = totalDebit.toLocaleString('ko-KR') + '원';
        document.getElementById('totalCredit').textContent = totalCredit.toLocaleString('ko-KR') + '원';

        var balanceEl = document.getElementById('balanceStatus');
        if (totalDebit === 0 && totalCredit === 0) {
            balanceEl.className = 'badge bg-secondary';
            balanceEl.textContent = '입력 대기';
        } else if (totalDebit === totalCredit) {
            balanceEl.className = 'badge bg-success';
            balanceEl.textContent = '차대 일치';
        } else {
            balanceEl.className = 'badge bg-danger';
            balanceEl.textContent = '차액: ' + Math.abs(totalDebit - totalCredit).toLocaleString('ko-KR') + '원';
        }
    }

    // 폼 제출 전 검증
    document.getElementById('journalForm').addEventListener('submit', function(e) {
        var totalDebit = 0, totalCredit = 0;
        document.querySelectorAll('.debit-input').forEach(function(input) {
            totalDebit += parseFloat(input.value) || 0;
        });
        document.querySelectorAll('.credit-input').forEach(function(input) {
            totalCredit += parseFloat(input.value) || 0;
        });

        if (totalDebit === 0 && totalCredit === 0) {
            e.preventDefault();
            alert('분개 금액을 입력해주세요.');
            return;
        }
        if (totalDebit !== totalCredit) {
            e.preventDefault();
            alert('차변과 대변의 합계가 일치하지 않습니다.\n차변: ' +
                  totalDebit.toLocaleString() + '원\n대변: ' + totalCredit.toLocaleString() + '원');
            return;
        }
        var dateInput = document.querySelector('input[name="transactionDate"]');
        if (!dateInput.value) {
            e.preventDefault();
            alert('거래일자를 입력해주세요.');
            dateInput.focus();
        }
    });

    // 초기화
    addBtn.addEventListener('click', addEntryRow);
    entryBody.querySelectorAll('.entry-row').forEach(function(row) {
        bindRowEvents(row);
    });

    // 신규일 때 기본 2줄 추가
    if (entryBody.querySelectorAll('.entry-row').length === 0) {
        addEntryRow();
        addEntryRow();
    }
    updateTotals();
})();
</script>
</th:block>
</body>
</html>
