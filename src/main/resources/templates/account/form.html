<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
    <title>계정과목 등록/수정</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>
            <i class="bi bi-journal-text"></i>
            <span th:text="${account.id != null ? '계정과목 수정' : '계정과목 등록'}"></span>
        </h2>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{/accounts/save}" th:object="${account}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">계정코드 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{code}"
                               placeholder="예: 1010" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">계정명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}"
                               placeholder="예: 현금" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">유형 <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{type}" required>
                            <option value="">선택하세요</option>
                            <option th:each="t : ${accountTypes}"
                                    th:value="${t}"
                                    th:text="${t.label}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">상태</label>
                        <div class="form-check form-switch mt-2">
                            <input class="form-check-input" type="checkbox" th:field="*{active}">
                            <label class="form-check-label">활성</label>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">설명</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"
                              placeholder="계정과목에 대한 설명을 입력하세요"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> 저장
                    </button>
                    <a th:href="@{/accounts}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> 목록으로
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
